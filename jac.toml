[project]
name = "jac-mcp-playground"
version = "1.0.0"
description = "Jac client application: jac-mcp-playground"
entry-point = "main.jac"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[plugins.mcp]
transport = "sse"
port = 3001
host = "127.0.0.1"
expose_grammar = true
expose_docs = true
expose_examples = true
expose_pitfalls = true
enable_validate = true
enable_format = true
enable_py2jac = true
enable_ast = false
project_root = "."

[dependencies.npm]
jac-client-node = "1.0.4"
tailwindcss = "latest"
"@tailwindcss/vite" = "latest"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"