[project]
name = "jac-mcp-playground"
version = "1.0.0"
description = "Jac client application: jac-mcp-playground"
entry-point = "main.jac"

[dependencies]

[dependencies.npm]
jac-client-node = "1.0.4"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

[plugins.mcp]
# Transport settings
transport = "stdio"          
port = 3001                 
host = "127.0.0.1"          

# Resource exposure
expose_grammar = true        
expose_docs = true           
expose_examples = true       
expose_pitfalls = true       

# Tool enable/disable
enable_validate = true     
enable_format = true         
enable_py2jac = true         
enable_ast = false           

# Project context
project_root = "."    
